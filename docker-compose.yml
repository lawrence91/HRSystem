version: '3.9'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Password123
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql 
    networks:
      - hrnet
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Password123", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  employee-service:
    build: ./employee-service
    container_name: employee-service
    ports:
      - "8081:80"
    volumes:
      - sql_data:/var/opt/mssql  
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=EmployeeDb;User Id=sa;Password=Password123;TrustServerCertificate=True
    networks:
      - hrnet

  leave-service:
    build: ./leave-service
    container_name: leave-service
    ports:
      - "8082:80"
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=LeaveDb;User Id=sa;Password=Password123;TrustServerCertificate=True
    networks:
      - hrnet

  hr-frontend:
    build: ./hr-frontend
    container_name: hr-frontend
    ports:
      - "5173:80"
    depends_on:
      - employee-service
      - leave-service
    networks:
      - hrnet

networks:
  hrnet:
    driver: bridge

volumes:
  sql_data: 
